# docker-compose.yml
# Runs the Drift API and Streamlit dashboard together

version: "3.9"

services:
  api:
    build: .
    container_name: drift-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data      # mount data dir so model files are accessible
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: drift-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000   # internal docker network
    restart: unless-stopped
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
